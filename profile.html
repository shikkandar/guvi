<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GUVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">GUVI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <!-- User Info Card -->
                <div class="card shadow-lg mb-4 border-0">
                    <div class="card-header bg-primary text-white py-4">
                        <h2 class="mb-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-person-circle me-2" viewBox="0 0 16 16">
                                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm.256 7a4.474 4.474 0 0 1-.759-1.025c.02-.02.045-.035.07-.052a3.36 3.36 0 0 0 .967.52c.393.379.744.682.868.1.023.039.036.089.036.151.0.504-.784 2.189-4.447 2.189.558.106 1.114.17 1.67.07m4.038-1.901.047.02c.837-.572 2.228-2.619 2.228-5.537 0-2.6-2.255-4.681-5.088-4.681-.859 0-1.676.181-2.433.52-.456-.306-.998-.489-1.595-.489C2.926 1.133 1 3.060 1 5.422c0 3.065 3.193 5.12 4.822 5.12 2.51 0 5.361-2.737 5.952-5.62z"/>
                            </svg>
                            My Profile
                        </h2>
                    </div>
                    <div class="card-body pt-4">
                        <div id="alertMessage" class="alert alert-dismissible fade hide" role="alert">
                            <span id="alertText"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- User Info Section -->
                        <div id="profileInfo" class="bg-light p-4 rounded-3 mb-4 border-start border-primary border-4">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <p class="text-muted small mb-1">Email Address</p>
                                    <p class="fw-bold fs-5" id="emailDisplay"></p>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <p class="text-muted small mb-1">Full Name</p>
                                    <p class="fw-bold fs-5" id="fullnameDisplay"></p>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">
                        <h5 class="mb-4">Additional Information</h5>

                        <form id="profileForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="age" class="form-label fw-bold">Age</label>
                                        <input type="number" class="form-control form-control-lg" id="age" name="age" min="1" placeholder="Enter your age">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="dob" class="form-label fw-bold">Date of Birth</label>
                                        <input type="date" class="form-control form-control-lg" id="dob" name="dob">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="contact" class="form-label fw-bold">Contact Number</label>
                                <input type="tel" class="form-control form-control-lg" id="contact" name="contact" placeholder="+1 (555) 000-0000">
                            </div>

                            <div class="mb-4">
                                <label for="address" class="form-label fw-bold">Address</label>
                                <textarea class="form-control form-control-lg" id="address" name="address" rows="3" placeholder="Enter your address"></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-check-lg me-2" viewBox="0 0 16 16">
                                    <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.017 1.052L7.88 12.414a.75.75 0 1 1-1.060-1.06l5.926-5.924z"/>
                                    <path d="m2.166 12.227-.353-.353a.75.75 0 0 0-1.06 1.06l1.414 1.414c.289.289.756.290 1.052.017l3.71-3.71a.75.75 0 0 0-1.06-1.06l-3.693 3.693z"/>
                                </svg>
                                Update Profile
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
