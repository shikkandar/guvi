<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GUVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">GUVI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <!-- User Info Card -->
                <div class="card shadow-lg mb-4 border-0">
                    <div class="card-header bg-primary text-white py-4">
                        <h2 class="mb-0">
                            <img src="assets/person.svg" alt="Profile" class="me-2" width="28" height="28">
                            My Profile
                        </h2>
                    </div>
                    <div class="card-body pt-4">
                        <div id="alertMessage" class="alert alert-dismissible fade hide" role="alert">
                            <span id="alertText"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- User Info Section -->
                        <div id="profileInfo" class="bg-light p-4 rounded-3 mb-4 border-start border-primary border-4">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <p class="text-muted small mb-1">Email Address</p>
                                    <p class="fw-bold fs-5" id="emailDisplay"></p>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <p class="text-muted small mb-1">Full Name</p>
                                    <p class="fw-bold fs-5" id="fullnameDisplay"></p>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">
                        <h5 class="mb-4">Additional Information</h5>

                        <form id="profileForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="age" class="form-label fw-bold">Age</label>
                                        <input type="number" class="form-control form-control-lg" id="age" name="age" min="1" placeholder="Enter your age">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="dob" class="form-label fw-bold">Date of Birth</label>
                                        <input type="date" class="form-control form-control-lg" id="dob" name="dob">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="contact" class="form-label fw-bold">Contact Number</label>
                                <input type="tel" class="form-control form-control-lg" id="contact" name="contact" placeholder="+1 (555) 000-0000">
                            </div>

                            <div class="mb-4">
                                <label for="address" class="form-label fw-bold">Address</label>
                                <textarea class="form-control form-control-lg" id="address" name="address" rows="3" placeholder="Enter your address"></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <img src="assets/check.svg" alt="Update" class="me-2" width="18" height="18">
                                Update Profile
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
