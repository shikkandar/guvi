<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GUVI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">GUVI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5" style="min-height: calc(100vh - 100px); display: flex; align-items: center;">
        <div class="row justify-content-center w-100">
            <div class="col-lg-5">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white py-4">
                        <h2 class="mb-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-lock-fill me-2" viewBox="0 0 16 16">
                                <path d="M5.338 1.59a61.44 61.44 0 0 0-2.837.856.481.481 0 0 0-.328.39c-.554 4.157.726 7.030 2.818 9.678.822.971 1.844 2.113 2.798 2.983a.5.5 0 0 0 .872-.5c-.968-1.068-2.009-2.187-2.822-3.176C4.615 13.471 4 12.5 4 11.5v-1a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.494.574c.162 1.03-.26 1.944-.963 2.823-.704.874-1.325 2.023-1.679 2.992-.133.26-.294.432-.38.537a.5.5 0 0 0 .42.865c.218-.113.438-.303.657-.567.327-.392.582-.956.781-1.694a6.975 6.975 0 0 0 .06-1.78V5.5a.5.5 0 0 0-.5-.5H4v-.5a3 3 0 0 1 1.659-2.676 1.884 1.884 0 0 0 1.210-2.423 1.9 1.9 0 0 0-1.531-1.412zM11 7a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
                            </svg>
                            Welcome Back
                        </h2>
                    </div>
                    <div class="card-body pt-4">
                        <div id="alertMessage" class="alert alert-dismissible fade hide" role="alert">
                            <span id="alertText"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form id="loginForm">
                            <div class="mb-4">
                                <label for="email" class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="you@example.com" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Enter your password" required>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-box-arrow-in-right me-2" viewBox="0 0 16 16">
                                    <path fill-rule="evenodd" d="M6 3.5a.5.5 0 0 1 .5.5v5a.5.5 0 0 1-1 0V4a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 .5.5v5a.5.5 0 0 1-1 0V4a.5.5 0 0 1 .5-.5h-6z"/>
                                    <path fill-rule="evenodd" d="M11.854 8.354l3-3a.5.5 0 0 0-.708-.708L8.5 10.793V1.5a.5.5 0 0 0-1 0v9.293L3.854 4.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0z"/>
                                </svg>
                                Login
                            </button>
                        </form>

                        <hr class="my-4">

                        <p class="text-center mb-0">
                            Don't have an account? <a href="register.html" class="fw-bold">Register here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
